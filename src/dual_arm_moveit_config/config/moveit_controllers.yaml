move_group:
  ros__parameters:
    trajectory_execution:
      allowed_execution_duration_scaling: 1.2
      allowed_goal_duration_margin: 0.5
      allowed_start_tolerance: 0.01
      trajectory_duration_monitoring: true

    moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

    moveit_simple_controller_manager:
      controller_names:
        - dual_arm_controller
        - left_arm_controller
        - right_arm_controller
        - left_hand_controller
        - right_hand_controller

      dual_arm_controller:
        action_ns: follow_joint_trajectory
        type: FollowJointTrajectory
        default: true
        joints:
          - left_panda_joint1
          - left_panda_joint2
          - left_panda_joint3
          - left_panda_joint4
          - left_panda_joint5
          - left_panda_joint6
          - left_panda_joint7
          - right_panda_joint1
          - right_panda_joint2
          - right_panda_joint3
          - right_panda_joint4
          - right_panda_joint5
          - right_panda_joint6
          - right_panda_joint7

      left_arm_controller:
        action_ns: follow_joint_trajectory
        type: FollowJointTrajectory
        default: false
        joints:
          - left_panda_joint1
          - left_panda_joint2
          - left_panda_joint3
          - left_panda_joint4
          - left_panda_joint5
          - left_panda_joint6
          - left_panda_joint7

      right_arm_controller:
        action_ns: follow_joint_trajectory
        type: FollowJointTrajectory
        default: false
        joints:
          - right_panda_joint1
          - right_panda_joint2
          - right_panda_joint3
          - right_panda_joint4
          - right_panda_joint5
          - right_panda_joint6
          - right_panda_joint7

      left_hand_controller:
        action_ns: gripper_command
        type: GripperCommand
        default: false
        joints:
          - left_panda_finger_joint1

      right_hand_controller:
        action_ns: gripper_command
        type: GripperCommand
        default: false
        joints:
          - right_panda_finger_joint1
